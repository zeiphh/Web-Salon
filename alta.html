<html lang="es">

  <link rel="icon" href="imagenes/lahaciendita.jpeg" type="image/x-icon">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <img src="imagenes/lahaciendita.jpeg" alt="Salón La Haciendita">
  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="nosotros.html">Sobre Nosotros</a></li>
      <li><a href="servicios.html">Servicios</a></li>

    </ul>
  </nav>
</header>

<main class="form-main">
  <h1>Alta de producto o servicio</h1>

  <form class="formulario" action="#" method="post">
    <label for="tipo">Tipo:</label>
    <select id="tipo" name="tipo" required>
      <option value="">Selecciona una opción</option>
      <option value="producto">Producto</option>
      <option value="servicio">Servicio</option>
    </select>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required maxlength="60">

    <label for="descripcion">Descripción:</label>
    <textarea id="descripcion" name="descripcion" required maxlength="250"></textarea>

    <label for="precio">Precio (MXN):</label>
    <input type="number" id="precio" name="precio" min="0" step="0.01" required>

    <button type="submit">Guardar</button>
    <button type="reset" class="btn-secundario">Limpiar</button>
  </form>
</main>

<footer>
  <div class="footer-contenido">
    <p>&copy; 2026 Salón de Eventos La Haciendita. Todos los derechos reservados.</p>
  </div>
</footer>

</body>
