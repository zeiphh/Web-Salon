<main class="form-main">

<h1>Modificar producto o servicio</h1>

<form class="formulario" action="#" method="post">

<label for="id">ID a modificar:</label>
<input type="number" id="id" name="id" min="1" required>

<label for="nombre">Nuevo nombre:</label>
<input type="text" id="nombre" name="nombre" required maxlength="60">

<label for="descripcion">Nueva descripción:</label>
<textarea id="descripcion" name="descripcion" required maxlength="250"></textarea>

<label for="precio">Nuevo precio (MXN):</label>
<input type="number" id="precio" name="precio" min="0" step="0.01" required>

<button type="submit">Actualizar</button>

</form>
